<svg xmlns="http://www.w3.org/2000/svg" width="600" height="100" viewBox="0 0 600 100" preserveAspectRatio="xMidYMid meet">
  <style>
    /* Reduced font size and tighter spacing to minimize unused height */
    text { font-family: 'Fira Code', monospace; font-weight: 500; font-size: 18px; fill: #58A6FF; direction: rtl; }
    .maskRect { fill: white; transform-origin: 100% 50%; }

    /* Reveal animation: gradual scaleX from right to left for a smooth typing-like reveal */
    @keyframes reveal {
      0%   { transform: scaleX(0); }
      40%  { transform: scaleX(1); }
      90%  { transform: scaleX(1); }
      100% { transform: scaleX(0); }
    }

    /* Staggered delays so lines reveal one after another; total cycle 8s */
    .mask1 { animation: reveal 8s linear infinite 0s; }
    .mask2 { animation: reveal 8s linear infinite 1.8s; }
    .mask3 { animation: reveal 8s linear infinite 3.6s; }
    .mask4 { animation: reveal 8s linear infinite 5.4s; }
  </style>

  <defs>
    <!-- Masks sized to the text line height to avoid extra vertical space -->
    <mask id="m1"><rect class="maskRect mask1" x="0" y="0" width="600" height="22"/></mask>
    <mask id="m2"><rect class="maskRect mask2" x="0" y="22" width="600" height="22"/></mask>
    <mask id="m3"><rect class="maskRect mask3" x="0" y="44" width="600" height="22"/></mask>
    <mask id="m4"><rect class="maskRect mask4" x="0" y="66" width="600" height="22"/></mask>
  </defs>

  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Right-aligned Arabic lines revealed right-to-left by the staggered masked rects -->
  <text x="580" y="16" text-anchor="end" mask="url(#m1)">السَّلاَمُ عَلَيْكُمْ</text>
  <text x="580" y="38" text-anchor="end" mask="url(#m2)">فإن حزب الله هم الغالبون</text>
  <text x="580" y="60" text-anchor="end" mask="url(#m3)">السلام عليك يا رسول الله</text>
  <text x="580" y="82" text-anchor="end" mask="url(#m4)">اَلسَّلَامُ عَلَيْكَ يَا أَبَا عَبْدِ اللَّهِ</text>
</svg>
