<svg xmlns="http://www.w3.org/2000/svg" width="600" height="140" viewBox="0 0 600 140" preserveAspectRatio="xMidYMid meet">
  <style>
    text { font-family: 'Fira Code', monospace; font-weight: 500; font-size: 20px; fill: #58A6FF; }
    .maskRect { fill: white; transform-origin: 100% 50%; }
    @keyframes reveal {
      0%   { transform: scaleX(0); }
      10%  { transform: scaleX(1); }
      50%  { transform: scaleX(1); }
      60%  { transform: scaleX(0); }
      100% { transform: scaleX(0); }
    }
    .mask1 { animation: reveal 12s linear infinite 0s; }
    .mask2 { animation: reveal 12s linear infinite 3s; }
    .mask3 { animation: reveal 12s linear infinite 6s; }
    .mask4 { animation: reveal 12s linear infinite 9s; }
  </style>

  <defs>
    <mask id="m1"><rect class="maskRect mask1" x="0" y="0" width="600" height="30"/></mask>
    <mask id="m2"><rect class="maskRect mask2" x="0" y="40" width="600" height="30"/></mask>
    <mask id="m3"><rect class="maskRect mask3" x="0" y="80" width="600" height="30"/></mask>
    <mask id="m4"><rect class="maskRect mask4" x="0" y="120" width="600" height="30"/></mask>
  </defs>

  <rect width="100%" height="100%" fill="transparent"/>

  <!-- Right-aligned Arabic lines revealed leftwards by the masked rects -->
  <text x="580" y="22" text-anchor="end" mask="url(#m1)">السَّلاَمُ عَلَيْكُمْ</text>
  <text x="580" y="62" text-anchor="end" mask="url(#m2)">فإن حزب الله هم الغالبون</text>
  <text x="580" y="102" text-anchor="end" mask="url(#m3)">السلام عليك يا رسول الله</text>
  <text x="580" y="142" text-anchor="end" mask="url(#m4)">اَلسَّلَامُ عَلَيْكَ يَا أَبَا عَبْدِ اللَّهِ</text>
</svg>
